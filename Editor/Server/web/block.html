<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Blocky Expression UI</title>
<link rel="stylesheet" href="./css/block.css">
<link rel="icon" href="./css/favicon.ico" type="image/x-icon">
</head>
<body>

<button id="drawer-toggle">≪</button>
<div id="drawer"></div>
<div id="field"></div>

<div id="expression-area">Send</div>
<div id="compoment-area">Compoment</div>
<div id="trash">Trash</div>

<div id="compoment-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">List</h3>
    </div>
    <div class="modal-body">
      <div id="compoment-list-container"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-close" id="btn-close-list">Close</button>
    </div>
  </div>
</div>

<div id="expression-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">Expression Check</h3>
    </div>
    <div class="modal-body">
      <div class="modal-form-row">
        <div class="form-group flex-grow">
          <label for="expression-name" class="modal-label">Expression Name:</label>
          <input type="text" id="expression-name" placeholder="ex : flight data" spellcheck="false">
        </div>
      </div>
      <p style="font-size: 12px; color: #666; margin-top: 15px; margin-bottom: 8px;">Generated Expression:</p>
      <textarea id="expression-textarea" spellcheck="false"></textarea>
      
      <div id="flowchart-wrapper-placeholder"></div>
      <div id="modal-warning" style="display:none;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-close" id="btn-close-expr">Cancel</button>
      <button class="btn-send" class="btn-send">Send</button>
    </div>
  </div>
</div>

<script src="./js/block/module/mermaid.min.js"></script> 
<script type="module" src="./js/block/main.js"></script> 
</body>
</html>
